<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slothing — Web Zhuyin IME</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main>
    <header>
      <h1><span class="sloth">懶</span> Slothing</h1>
      <p class="tag">注音輸入法 · decoded by a 34M model, no libchewing</p>
    </header>

    <textarea id="output" placeholder="解碼後的中文會送到這裡…" rows="3"></textarea>

    <section class="ime">
      <div id="preedit" class="preedit empty">​</div>
      <div id="segments" class="segments"></div>
      <div id="cands" class="cands"></div>
      <p id="hint" class="hint"></p>
      <div class="controls">
        <button id="convertBtn">轉換 ⏎</button>
        <button id="commitBtn">確認</button>
        <button id="clearBtn">清除</button>
        <label class="toggle"><input type="checkbox" id="toneless"> 免聲調</label>
      </div>
    </section>

    <div id="keyboard" class="keyboard"></div>

    <footer>
      <p>試打 <code>ㄨㄛˇ ㄗㄞˋ ㄔㄨㄥˊ ㄒㄧㄣ ㄎㄠˇ ㄌㄩˋ</code> → 我在重新考慮。
      每個字都受「音對得上」的文法約束，模型只能挑真正這樣唸的字。</p>
      <p><a href="https://github.com/vieenrose/sloth-zhuyin-linux" target="_blank">GitHub</a>
       · <a href="https://huggingface.co/Luigi/slothlm-34m-zhuyin" target="_blank">SlothLM 模型</a></p>
    </footer>
  </main>
  <script src="/static/ime.js"></script>
</body>
</html>
