<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Sloth IME IME icon: a three-toed sloth face. The identifying features,
       kept legible at 16px: shaggy brown fur ring, cream face, the sloth's
       signature DIAGONAL eye-stripes sweeping outward/down, sleepy
       half-closed eyes, and the serene smile. -->
  <defs>
    <radialGradient id="fur" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#a9743f"/>
      <stop offset="100%" stop-color="#8b5a2b"/>
    </radialGradient>
    <radialGradient id="face" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#f8ecd8"/>
      <stop offset="100%" stop-color="#ecd3ae"/>
    </radialGradient>
  </defs>

  <!-- shaggy fur ring (slightly scalloped silhouette) -->
  <path d="M128 8
           q26 0 44 12 q26 -4 40 18 q22 10 22 36 q14 20 6 42
           q8 22 -6 40 q0 26 -22 36 q-14 22 -40 18 q-18 12 -44 12
           q-26 0 -44 -12 q-26 4 -40 -18 q-22 -10 -22 -36 q-14 -18 -6 -40
           q-8 -22 6 -42 q0 -26 22 -36 q14 -22 40 -18 q18 -12 44 -12 z"
        fill="url(#fur)"/>

  <!-- cream face disc -->
  <ellipse cx="128" cy="134" rx="88" ry="84" fill="url(#face)"/>

  <!-- signature diagonal eye-stripes: from the inner eye corners sweeping
       DOWN and OUTWARD to the fur edge -->
  <path d="M96 108 q-8 -10 -22 -6 q-26 8 -38 34 q-4 10 4 16 q10 6 18 -2
           q16 -18 34 -22 q10 -4 4 -20 z" fill="#5d4028"/>
  <path d="M160 108 q8 -10 22 -6 q26 8 38 34 q4 10 -4 16 q-10 6 -18 -2
           q-16 -18 -34 -22 q-10 -4 -4 -20 z" fill="#5d4028"/>

  <!-- sleepy half-closed eyes: heavy upper lids over small dark eyes -->
  <circle cx="88" cy="118" r="11" fill="#2e1d12"/>
  <circle cx="168" cy="118" r="11" fill="#2e1d12"/>
  <path d="M75 111 a13 13 0 0 1 26 0 z" fill="#ecd3ae"/>
  <path d="M155 111 a13 13 0 0 1 26 0 z" fill="#ecd3ae"/>
  <circle cx="92" cy="120" r="3" fill="#fff8f0" opacity="0.9"/>
  <circle cx="172" cy="120" r="3" fill="#fff8f0" opacity="0.9"/>

  <!-- broad flat sloth nose -->
  <path d="M128 138 q14 0 16 10 q2 12 -16 12 q-18 0 -16 -12 q2 -10 16 -10 z"
        fill="#4a2f1e"/>
  <circle cx="122" cy="146" r="2.6" fill="#2e1d12"/>
  <circle cx="134" cy="146" r="2.6" fill="#2e1d12"/>

  <!-- the serene sloth smile: wide, shallow, upturned at the ends -->
  <path d="M96 176 q32 26 64 0" fill="none" stroke="#4a2f1e"
        stroke-width="8" stroke-linecap="round"/>
  <path d="M96 176 q-6 -2 -8 -8 M160 176 q6 -2 8 -8" fill="none"
        stroke="#4a2f1e" stroke-width="8" stroke-linecap="round"/>
</svg>
