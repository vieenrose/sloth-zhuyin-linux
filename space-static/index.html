<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slothing — Web Zhuyin IME</title>
<style>
  :root{--bg:#faf6f0;--panel:#fff;--ink:#3a2e28;--brown:#8b5a2b;--border:#c9a87c;--muted:#8a7a6c;--hi:#fff8f0}
  @media (prefers-color-scheme:dark){:root{--bg:#241d18;--panel:#2e2621;--ink:#f0e8e0;--brown:#b57a44;--border:#5a4636;--muted:#a08e7e}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",system-ui,sans-serif;display:flex;justify-content:center;padding:1.4rem 1rem}
  main{width:100%;max-width:640px}
  header{text-align:center;margin-bottom:1rem}
  h1{margin:0;font-size:1.9rem}
  .sloth{color:var(--brown);font-weight:800;font-family:"Noto Serif TC",serif;margin-right:.2rem}
  .tag{color:var(--muted);font-size:.85rem;margin:.2rem 0 0}
  .out{width:100%;min-height:3.2rem;border:2px solid var(--border);border-radius:10px;background:var(--panel);padding:.6rem .8rem;font-size:1.3rem;line-height:1.6;margin-bottom:.7rem;white-space:pre-wrap;word-break:break-all}
  .ime{background:var(--panel);border:2px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem}
  .pre{min-height:2.2rem;font-size:1.6rem;color:var(--ink);border-bottom:2px dashed var(--border);padding-bottom:.4rem;margin-bottom:.5rem;word-break:break-all;line-height:1.5}
  .pre.empty{color:var(--muted)}
  .pchar{cursor:pointer;border-radius:6px;padding:0 .06em;border-bottom:3px solid var(--border)}
  .pchar:hover{background:var(--bg)}
  .pchar.fixsel{background:var(--brown);color:var(--hi)}
  .pchar.en{color:var(--brown);cursor:default;border-bottom-style:dotted}
  .ptail{color:var(--brown);letter-spacing:.1em;border-bottom:3px solid var(--brown)}
  .caret{display:inline-block;width:2px;height:1.35em;background:var(--brown);vertical-align:text-bottom;
    animation:blink 1s step-end infinite;margin:0 1px}
  @keyframes blink{50%{opacity:0}}
  .cand .n{font-size:.7rem;color:var(--muted);margin-right:.25rem}
  .cand.sel .n{color:var(--hi)}
  .cand.nav{font-weight:700}
  .pg{color:var(--muted);font-size:.8rem;align-self:center;margin-left:.3rem}
  .cands{display:flex;flex-wrap:wrap;gap:.3rem}.cands:not(:empty){margin-bottom:.5rem}
  .cand{font-size:1.15rem;padding:.15rem .5rem;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--ink);cursor:pointer}
  .cand.sel{background:var(--brown);color:var(--hi);border-color:var(--brown)}
  .hint{color:var(--muted);font-size:.82rem;margin:.3rem 0 .6rem;min-height:1.1rem}
  .ctrls{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
  .ctrls button{background:var(--brown);color:var(--hi);border:none;border-radius:8px;padding:.4rem .85rem;font-size:.95rem;cursor:pointer}
  .ctrls button:disabled{opacity:.5;cursor:default}
  .ctrls button.ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .toggle{margin-left:auto;color:var(--muted);font-size:.88rem;cursor:pointer}
  .kb{display:flex;flex-direction:column;gap:.3rem;align-items:center}
  .krow{display:flex;gap:.28rem}
  .key{position:relative;width:42px;height:44px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--ink);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0}
  .key:hover{background:var(--bg);border-color:var(--brown)}.key:active{background:var(--brown);color:var(--hi)}
  .key .k{font-size:.55rem;color:var(--muted)}.key .s{font-size:1rem;line-height:1}
  .key.wide{width:150px;height:38px;font-size:.9rem}
  .key.wide2{width:110px;height:38px;font-size:.9rem;background:var(--brown);color:var(--hi)}
  footer{margin-top:1.1rem;color:var(--muted);font-size:.8rem;text-align:center}
  footer a{color:var(--brown)}
  @media (max-width:480px){.key{width:29px;height:36px}.key.wide{width:100px}.key.wide2{width:80px}.pre{font-size:1.3rem}}
</style>
</head>
<body>
<main>
  <header>
    <h1><span class="sloth">懶</span>Slothing</h1>
    <p class="tag">注音輸入法 · 由 34M SlothLM 在瀏覽器內解碼 · libchewing-free</p>
  </header>
  <div class="out" id="out"></div>
  <div class="ime">
    <div class="pre empty" id="pre">​</div>
    <div class="cands" id="cands"></div>
    <p class="hint" id="hint">模型載入中…（首次約下載 33MB，之後離線可用）</p>
    <div class="ctrls">
      <button id="commit">⏎ 上字</button>
      <button class="ghost" id="clear">清除</button>
      <label class="toggle"><input type="checkbox" id="toneless"> 免聲調</label>
    </div>
  </div>
  <div class="kb" id="kb"></div>
  <footer>
    完全在你的瀏覽器內執行，不連伺服器。試打 <code>ㄨㄛˇ ㄗㄞˋ ㄔㄨㄥˊ ㄒㄧㄣ ㄎㄠˇ ㄌㄩˋ</code> → 我在重新考慮。<br>
    <a href="https://github.com/vieenrose/sloth-zhuyin-linux" target="_blank">GitHub</a> ·
    <a href="https://huggingface.co/Luigi/slothlm-34m-zhuyin" target="_blank">SlothLM</a>
  </footer>
</main>
<script type="module" src="./ime.js"></script>
</body>
</html>
